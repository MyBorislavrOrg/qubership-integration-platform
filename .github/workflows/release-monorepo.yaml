name: Monorepo release

on:
  workflow_dispatch:
    inputs:
      version-type:
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]
      components:
        description: "Comma-separated list of components to release"
        required: true
        default: "engine,runtime-catalog,parent,micro-engine,schemas,session-management,ui,vscode-extension"

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          components="${{ inputs.components }}"
          json=$(echo "$components" | jq -Rc 'split(",")')
          echo "matrix={\"component\":$json}" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: netcracker/qubership-workflow-hub/actions/maven-monorepo-release@feature/764-feat-maven-release-action-should-be-able-to-create-releases-in-a-monorepo
        with:
          component: ${{ matrix.component }}
          version-type: ${{ inputs.version-type }}
          token: ${{ secrets.GITHUB_TOKEN }}
          maven-user: ${{ github.actor }}
          maven-password: ${{ secrets.GITHUB_TOKEN }}
          dry-run: "false"
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          profile: github
